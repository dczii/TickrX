name: Preview Build Agent

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  preview:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    needs: [test, lint, security]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Deploy preview to Vercel
        id: deploy
        run: |
          npm install -g vercel
          DEPLOY_URL=$(vercel deploy \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --env NEXT_PUBLIC_ENV=preview \
            --yes \
            2>&1 | grep -oE 'https://[^ ]+\.vercel\.app' | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Post preview URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deploy_url }}';
            const body = url
              ? `## 🚀 Preview Build Ready\n\n| | |\n|---|---|\n| **URL** | [${url}](${url}) |\n| **Branch** | \`${{ github.head_ref }}\` |\n| **Commit** | \`${{ github.sha }}\`.slice(0,7) |\n\nThis preview is deployed to Vercel and reflects the latest commit on this PR.`
              : '## ⚠️ Preview Build\n\nDeploy URL not captured — check the workflow logs.';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

# Required secrets (Settings → Secrets and variables → Actions):
# VERCEL_TOKEN      — Vercel personal access token
# VERCEL_ORG_ID     — Vercel team/org ID (from vercel.json or project settings)
# VERCEL_PROJECT_ID — Vercel project ID
