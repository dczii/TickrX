name: Test Agent

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Test Agent (Claude agentic loop)
        run: |
          PR_ARG=""
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            PR_ARG="--pr ${{ github.event.pull_request.number }}"
          fi
          node scripts/test-agent.js $PR_ARG
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit any test fixes applied by the agent
        if: always() && github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: auto-fix failing tests by Test Agent [skip ci]"
          commit_user_name: "Test Agent"
          commit_user_email: "agent@tickrx.app"
